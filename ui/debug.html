<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TurtleLootLine Debug Log</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .debug-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      flex-shrink: 0;
    }
    .debug-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .count-badge {
      background: var(--bg-hover);
      border-radius: 10px;
      padding: 2px 10px;
      font-size: 11px;
      color: var(--text-dim);
    }
    .header-spacer { flex: 1; }
    .clear-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid rgba(243, 139, 168, 0.19);
      background: none;
      color: var(--error);
      font-size: 12px;
      cursor: pointer;
      font-family: var(--font-sans);
    }
    .clear-btn:hover { background: rgba(243, 139, 168, 0.08); }

    /* Filter bar */
    .filter-bar {
      display: flex;
      gap: 6px;
      padding: 8px 20px;
      flex-shrink: 0;
    }
    .filter-pill {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 5px 12px;
      border-radius: 16px;
      border: none;
      background: none;
      color: var(--text-dim);
      font-size: 12px;
      cursor: pointer;
      font-family: var(--font-sans);
      transition: all 0.15s;
    }
    .filter-pill:hover { background: var(--bg-hover); }
    .filter-pill.active { background: var(--bg-hover); color: var(--primary); }
    .filter-pill.active[data-type="sync"] { color: var(--success); background: rgba(166, 227, 161, 0.08); }
    .filter-pill.active[data-type="info"] { color: var(--primary); background: rgba(137, 180, 250, 0.08); }
    .filter-pill.active[data-type="warn"] { color: #fab387; background: rgba(250, 179, 135, 0.08); }
    .filter-pill.active[data-type="error"] { color: var(--error); background: rgba(243, 139, 168, 0.08); }

    /* Log area */
    .log-area {
      flex: 1;
      overflow-y: auto;
      padding: 8px 16px;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .log-area::-webkit-scrollbar { width: 6px; }
    .log-area::-webkit-scrollbar-track { background: transparent; }
    .log-area::-webkit-scrollbar-thumb { background: #45475a; border-radius: 3px; }
    .log-area::-webkit-scrollbar-thumb:hover { background: #585b70; }

    .log-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 6px;
      transition: background 0.1s;
    }
    .log-row:hover { background: var(--bg-hover); }
    .log-row.hidden { display: none; }

    .log-time {
      width: 90px;
      flex-shrink: 0;
      font-size: 11px;
      color: var(--text-dim);
      font-family: var(--font-mono);
    }
    .log-badge {
      width: 44px;
      flex-shrink: 0;
      text-align: center;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 0;
      border-radius: 4px;
      text-transform: uppercase;
    }
    .log-badge.sync { color: var(--success); background: rgba(166, 227, 161, 0.08); }
    .log-badge.info { color: var(--primary); background: rgba(137, 180, 250, 0.08); }
    .log-badge.warn { color: #fab387; background: rgba(250, 179, 135, 0.08); }
    .log-badge.error { color: var(--error); background: rgba(243, 139, 168, 0.08); }
    .log-badge.updater { color: #cba6f7; background: rgba(203, 166, 247, 0.08); }

    .log-msg {
      flex: 1;
      min-width: 0;
      font-size: 12px;
      color: var(--text-primary);
      font-family: var(--font-sans);
    }
    .log-data {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: var(--font-mono);
    }
    .log-data.expanded {
      white-space: pre-wrap;
      overflow: visible;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-dim);
      gap: 8px;
      font-size: 13px;
    }

    /* Bottom bar */
    .bottom-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      border-top: 1px solid var(--border-primary);
      flex-shrink: 0;
    }
    .auto-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 12px;
      color: var(--text-secondary);
    }
    .auto-toggle input { accent-color: var(--primary); }
    .bottom-spacer { flex: 1; }
    .showing-text {
      font-size: 11px;
      color: var(--text-dim);
    }

    @keyframes logHighlight {
      from { background: rgba(137, 180, 250, 0.1); }
      to { background: transparent; }
    }
    .log-row.new { animation: logHighlight 1.5s ease-out; }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="debug-header">
    <span class="debug-title">Debug Log</span>
    <span class="count-badge" id="countBadge">0</span>
    <span class="header-spacer"></span>
    <button class="clear-btn" id="clearBtn">&#x1F5D1; Clear All</button>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar">
    <button class="filter-pill active" data-type="all">All</button>
    <button class="filter-pill active" data-type="sync">&#x21BB; Sync</button>
    <button class="filter-pill active" data-type="info">&#x24D8; Info</button>
    <button class="filter-pill active" data-type="warn">&#x26A0; Warn</button>
    <button class="filter-pill active" data-type="error">&#x2715; Error</button>
  </div>

  <!-- Log area -->
  <div class="log-area" id="logArea">
    <div class="empty-state" id="emptyState">
      <div style="font-size: 24px; opacity: 0.4;">&#x1F4CB;</div>
      <div>Waiting for sync events...</div>
    </div>
  </div>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <label class="auto-toggle">
      <input type="checkbox" id="autoScroll" checked>
      Auto-scroll
    </label>
    <span class="bottom-spacer"></span>
    <span class="showing-text" id="showingText"></span>
  </div>

  <script>
    const logArea = document.getElementById('logArea');
    const emptyState = document.getElementById('emptyState');
    const countBadge = document.getElementById('countBadge');
    const showingText = document.getElementById('showingText');
    const autoScrollCheck = document.getElementById('autoScroll');

    const activeFilters = new Set(['sync', 'info', 'warn', 'error', 'updater']);
    let totalEntries = 0;

    function formatTime(isoString) {
      const d = new Date(isoString);
      return d.toLocaleTimeString('en-GB', { hour12: false });
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function createLogRow(entry, isNew) {
      const el = document.createElement('div');
      el.className = 'log-row' + (isNew ? ' new' : '');
      el.dataset.type = entry.type;
      if (!activeFilters.has(entry.type)) el.classList.add('hidden');

      let dataHtml = '';
      if (entry.data) {
        const dataStr = typeof entry.data === 'string' ? entry.data : JSON.stringify(entry.data, null, 2);
        dataHtml = `<div class="log-data" title="Click to expand">${escapeHtml(dataStr)}</div>`;
      }

      el.innerHTML = `
        <span class="log-time">${formatTime(entry.timestamp)}</span>
        <span class="log-badge ${entry.type}">${entry.type}</span>
        <div class="log-msg">
          ${escapeHtml(entry.message)}
          ${dataHtml}
        </div>
      `;

      const dataEl = el.querySelector('.log-data');
      if (dataEl) {
        dataEl.addEventListener('click', () => dataEl.classList.toggle('expanded'));
      }

      return el;
    }

    function updateCounts() {
      countBadge.textContent = totalEntries;
      const visible = logArea.querySelectorAll('.log-row:not(.hidden)').length;
      showingText.textContent = visible < totalEntries
        ? `Showing ${visible} of ${totalEntries}`
        : `Showing ${totalEntries} of ${totalEntries}`;
    }

    function applyFilters() {
      logArea.querySelectorAll('.log-row').forEach(el => {
        el.classList.toggle('hidden', !activeFilters.has(el.dataset.type));
      });
      updateCounts();
    }

    function addEntry(entry, isNew) {
      if (emptyState.parentNode) emptyState.remove();
      logArea.appendChild(createLogRow(entry, isNew));
      totalEntries++;
      updateCounts();
      if (autoScrollCheck.checked) logArea.scrollTop = logArea.scrollHeight;
    }

    // Filter pills
    document.querySelectorAll('.filter-pill').forEach(btn => {
      btn.addEventListener('click', () => {
        const type = btn.dataset.type;
        if (type === 'all') {
          const allActive = activeFilters.size >= 4;
          if (allActive) {
            activeFilters.clear();
            document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
          } else {
            ['sync', 'info', 'warn', 'error', 'updater'].forEach(t => activeFilters.add(t));
            document.querySelectorAll('.filter-pill').forEach(b => b.classList.add('active'));
          }
        } else {
          btn.classList.toggle('active');
          if (activeFilters.has(type)) activeFilters.delete(type);
          else activeFilters.add(type);
          const allBtn = document.querySelector('.filter-pill[data-type="all"]');
          allBtn.classList.toggle('active', activeFilters.size >= 4);
        }
        applyFilters();
      });
    });

    // Clear
    document.getElementById('clearBtn').addEventListener('click', async () => {
      await window.electronAPI.clearDebugLogs();
      logArea.innerHTML = '';
      logArea.appendChild(emptyState);
      totalEntries = 0;
      updateCounts();
    });

    // Load existing logs
    (async () => {
      const logs = await window.electronAPI.getDebugLogs();
      for (const entry of logs) addEntry(entry, false);
    })();

    // Real-time updates
    window.electronAPI.onDebugLog(entry => addEntry(entry, true));
  </script>
</body>
</html>
