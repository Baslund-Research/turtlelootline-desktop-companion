<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurtleLootLine Debug Log</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #1e1e2e;
            color: #cdd6f4;
            font-size: 13px;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .titlebar {
            background: #181825;
            padding: 6px 20px;
            border-bottom: 1px solid #313244;
            display: flex;
            align-items: center;
            justify-content: space-between;
            -webkit-app-region: drag;
            flex-shrink: 0;
        }

        .titlebar .title {
            font-size: 12px;
            font-weight: 600;
            color: #bac2de;
        }

        .titlebar .controls {
            display: flex;
            gap: 8px;
            -webkit-app-region: no-drag;
        }

        /* Toolbar */
        .toolbar {
            background: #181825;
            padding: 8px 16px;
            border-bottom: 1px solid #313244;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .filter-btn {
            padding: 4px 10px;
            border: 1px solid #45475a;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            background: transparent;
            color: #6c7086;
            font-family: inherit;
            transition: all 0.15s;
        }

        .filter-btn:hover {
            background: #313244;
            color: #cdd6f4;
        }

        .filter-btn.active {
            background: #313244;
            color: #cdd6f4;
            border-color: #585b70;
        }

        .filter-btn.active[data-type="sync"] { color: #a6e3a1; border-color: #a6e3a1; }
        .filter-btn.active[data-type="error"] { color: #f38ba8; border-color: #f38ba8; }
        .filter-btn.active[data-type="warn"] { color: #fab387; border-color: #fab387; }
        .filter-btn.active[data-type="info"] { color: #89b4fa; border-color: #89b4fa; }

        .toolbar-spacer { flex: 1; }

        .log-count {
            font-size: 11px;
            color: #6c7086;
        }

        .btn {
            padding: 4px 10px;
            border: 1px solid #45475a;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.15s;
            background: transparent;
            color: #bac2de;
        }

        .btn:hover {
            background: #313244;
            border-color: #585b70;
        }

        .btn-danger {
            color: #f38ba8;
            border-color: rgba(243, 139, 168, 0.3);
        }

        .btn-danger:hover {
            background: rgba(243, 139, 168, 0.1);
            border-color: #f38ba8;
        }

        /* Log container */
        .log-container {
            flex: 1;
            overflow-y: auto;
            padding: 4px 0;
            font-family: 'Cascadia Code', 'Consolas', 'Monaco', monospace;
            font-size: 12px;
        }

        .log-container::-webkit-scrollbar { width: 6px; }
        .log-container::-webkit-scrollbar-track { background: transparent; }
        .log-container::-webkit-scrollbar-thumb { background: #45475a; border-radius: 3px; }
        .log-container::-webkit-scrollbar-thumb:hover { background: #585b70; }

        .log-entry {
            padding: 3px 16px;
            display: flex;
            gap: 10px;
            align-items: flex-start;
            border-bottom: 1px solid rgba(49, 50, 68, 0.5);
            transition: background 0.1s;
        }

        .log-entry:hover {
            background: rgba(49, 50, 68, 0.5);
        }

        .log-entry.hidden {
            display: none;
        }

        .log-time {
            color: #585b70;
            white-space: nowrap;
            flex-shrink: 0;
            font-size: 11px;
            line-height: 1.6;
        }

        .log-type {
            width: 44px;
            flex-shrink: 0;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            line-height: 1.8;
        }

        .log-type.sync { color: #a6e3a1; }
        .log-type.error { color: #f38ba8; }
        .log-type.warn { color: #fab387; }
        .log-type.info { color: #89b4fa; }

        .log-content {
            flex: 1;
            min-width: 0;
        }

        .log-message {
            color: #cdd6f4;
            line-height: 1.6;
            word-break: break-word;
        }

        .log-data {
            color: #6c7086;
            font-size: 11px;
            margin-top: 2px;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .log-data.expanded {
            white-space: pre-wrap;
            overflow: visible;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #585b70;
            gap: 8px;
        }

        .empty-state .empty-icon {
            font-size: 32px;
            opacity: 0.5;
        }

        .empty-state .empty-text {
            font-size: 13px;
        }

        /* Auto-scroll indicator */
        .auto-scroll-bar {
            background: #181825;
            border-top: 1px solid #313244;
            padding: 4px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            font-size: 11px;
            color: #6c7086;
        }

        .auto-scroll-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .auto-scroll-toggle input {
            accent-color: #89b4fa;
        }

        /* New log highlight animation */
        @keyframes logHighlight {
            from { background: rgba(137, 180, 250, 0.1); }
            to { background: transparent; }
        }

        .log-entry.new {
            animation: logHighlight 1.5s ease-out;
        }
    </style>
</head>
<body>
    <div class="titlebar">
        <span class="title">Debug Log</span>
        <div class="controls">
            <span class="log-count" id="logCount">0 entries</span>
        </div>
    </div>

    <div class="toolbar">
        <button class="filter-btn active" data-type="all">All</button>
        <button class="filter-btn active" data-type="sync">Sync</button>
        <button class="filter-btn active" data-type="info">Info</button>
        <button class="filter-btn active" data-type="warn">Warn</button>
        <button class="filter-btn active" data-type="error">Error</button>
        <span class="toolbar-spacer"></span>
        <button class="btn btn-danger" id="clearBtn">Clear</button>
    </div>

    <div class="log-container" id="logContainer">
        <div class="empty-state" id="emptyState">
            <div class="empty-icon">...</div>
            <div class="empty-text">Waiting for sync events</div>
        </div>
    </div>

    <div class="auto-scroll-bar">
        <label class="auto-scroll-toggle">
            <input type="checkbox" id="autoScroll" checked>
            Auto-scroll
        </label>
        <span id="filteredCount"></span>
    </div>

    <script>
        const logContainer = document.getElementById('logContainer');
        const emptyState = document.getElementById('emptyState');
        const logCount = document.getElementById('logCount');
        const filteredCount = document.getElementById('filteredCount');
        const autoScrollCheck = document.getElementById('autoScroll');
        const clearBtn = document.getElementById('clearBtn');

        const activeFilters = new Set(['sync', 'info', 'warn', 'error']);
        let totalEntries = 0;

        function formatTime(isoString) {
            const d = new Date(isoString);
            return d.toLocaleTimeString('en-GB', { hour12: false }) + '.' + String(d.getMilliseconds()).padStart(3, '0');
        }

        function createLogEntry(entry, isNew = false) {
            const el = document.createElement('div');
            el.className = 'log-entry' + (isNew ? ' new' : '');
            el.dataset.type = entry.type;

            if (!activeFilters.has(entry.type)) {
                el.classList.add('hidden');
            }

            let dataHtml = '';
            if (entry.data) {
                const dataStr = typeof entry.data === 'string' ? entry.data : JSON.stringify(entry.data, null, 2);
                dataHtml = `<div class="log-data" title="Click to expand">${dataStr}</div>`;
            }

            el.innerHTML = `
                <span class="log-time">${formatTime(entry.timestamp)}</span>
                <span class="log-type ${entry.type}">${entry.type}</span>
                <div class="log-content">
                    <div class="log-message">${escapeHtml(entry.message)}</div>
                    ${dataHtml}
                </div>
            `;

            // Toggle data expansion
            const dataEl = el.querySelector('.log-data');
            if (dataEl) {
                dataEl.addEventListener('click', () => {
                    dataEl.classList.toggle('expanded');
                });
            }

            return el;
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function updateCounts() {
            logCount.textContent = `${totalEntries} entries`;
            const visibleCount = logContainer.querySelectorAll('.log-entry:not(.hidden)').length;
            if (visibleCount < totalEntries) {
                filteredCount.textContent = `Showing ${visibleCount} of ${totalEntries}`;
            } else {
                filteredCount.textContent = '';
            }
        }

        function applyFilters() {
            const entries = logContainer.querySelectorAll('.log-entry');
            entries.forEach(el => {
                if (activeFilters.has(el.dataset.type)) {
                    el.classList.remove('hidden');
                } else {
                    el.classList.add('hidden');
                }
            });
            updateCounts();
        }

        function addEntry(entry, isNew = false) {
            if (emptyState.parentNode) {
                emptyState.remove();
            }

            const el = createLogEntry(entry, isNew);
            logContainer.appendChild(el);
            totalEntries++;

            updateCounts();

            if (autoScrollCheck.checked) {
                logContainer.scrollTop = logContainer.scrollHeight;
            }
        }

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const type = btn.dataset.type;

                if (type === 'all') {
                    const allActive = activeFilters.size === 4;
                    if (allActive) {
                        activeFilters.clear();
                        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    } else {
                        ['sync', 'info', 'warn', 'error'].forEach(t => activeFilters.add(t));
                        document.querySelectorAll('.filter-btn').forEach(b => b.classList.add('active'));
                    }
                } else {
                    btn.classList.toggle('active');
                    if (activeFilters.has(type)) {
                        activeFilters.delete(type);
                    } else {
                        activeFilters.add(type);
                    }
                    // Update "All" button state
                    const allBtn = document.querySelector('.filter-btn[data-type="all"]');
                    if (activeFilters.size === 4) {
                        allBtn.classList.add('active');
                    } else {
                        allBtn.classList.remove('active');
                    }
                }

                applyFilters();
            });
        });

        // Clear button
        clearBtn.addEventListener('click', async () => {
            await window.electronAPI.clearDebugLogs();
            logContainer.innerHTML = '';
            logContainer.appendChild(emptyState);
            totalEntries = 0;
            updateCounts();
        });

        // Load existing logs
        (async () => {
            const logs = await window.electronAPI.getDebugLogs();
            for (const entry of logs) {
                addEntry(entry, false);
            }
        })();

        // Listen for new logs in real-time
        window.electronAPI.onDebugLog((entry) => {
            addEntry(entry, true);
        });
    </script>
</body>
</html>
