<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurtleLootLine Settings</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .path-input-group {
            display: flex;
            gap: 10px;
        }

        .path-input-group input {
            flex: 1;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
            width: 100%;
            margin-top: 10px;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .status-message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            display: none;
        }

        .status-message.error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
            display: block;
        }

        .status-message.success {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
            display: block;
        }

        .status-message.info {
            background: #eef;
            color: #33c;
            border: 1px solid #ccf;
            display: block;
        }

        .help-text {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .button-group button {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚙️ Settings</h1>
        <p class="subtitle">Manage your TurtleLootLine companion settings</p>

        <form id="settingsForm">
            <div class="form-group">
                <label for="syncToken">Sync Token</label>
                <input
                    type="text"
                    id="syncToken"
                    placeholder="ttl_abc123..."
                    required
                >
                <p class="help-text">Your TurtleLootLine sync token</p>
            </div>

            <div class="form-group">
                <label for="wowPath">WoW Installation Path</label>
                <div class="path-input-group">
                    <input
                        type="text"
                        id="wowPath"
                        placeholder="C:\Games\Turtle WoW"
                        required
                    >
                    <button type="button" class="btn-secondary" id="browsePath">Browse</button>
                </div>
                <p class="help-text">Path to your Turtle WoW folder</p>
            </div>

            <div class="form-group">
                <label for="syncInterval">Sync Interval (minutes)</label>
                <input
                    type="number"
                    id="syncInterval"
                    min="1"
                    max="60"
                    value="5"
                    required
                >
                <p class="help-text">How often to automatically sync (1-60 minutes)</p>
            </div>

            <div class="form-group">
                <div class="checkbox-group">
                    <input type="checkbox" id="autoStart" checked>
                    <label for="autoStart" style="margin: 0;">Start with system</label>
                </div>
            </div>

            <div class="button-group">
                <button type="button" class="btn-secondary" id="cancelButton">
                    Cancel
                </button>
                <button type="submit" class="btn-primary" id="saveButton">
                    Save Changes
                </button>
            </div>
        </form>

        <div id="statusMessage" class="status-message"></div>
    </div>

    <script>
        const form = document.getElementById('settingsForm');
        const statusMessage = document.getElementById('statusMessage');
        const saveButton = document.getElementById('saveButton');

        // Load current config
        (async () => {
            const config = await window.electronAPI.getConfig();

            document.getElementById('syncToken').value = config.syncToken || '';
            document.getElementById('wowPath').value = config.wowPath || '';
            document.getElementById('syncInterval').value = config.syncIntervalMinutes || 5;
            document.getElementById('autoStart').checked = config.autoStart !== false;
        })();

        // Browse for folder
        document.getElementById('browsePath').addEventListener('click', async () => {
            const selectedPath = await window.electronAPI.selectFolder();
            if (selectedPath) {
                document.getElementById('wowPath').value = selectedPath;
            }
        });

        // Cancel button
        document.getElementById('cancelButton').addEventListener('click', () => {
            window.close();
        });

        // Form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const config = {
                syncToken: document.getElementById('syncToken').value.trim(),
                wowPath: document.getElementById('wowPath').value.trim(),
                autoStart: document.getElementById('autoStart').checked,
                syncIntervalMinutes: parseInt(document.getElementById('syncInterval').value)
            };

            // Validate inputs
            if (!config.syncToken || !config.wowPath) {
                statusMessage.className = 'status-message error';
                statusMessage.textContent = 'Please fill in all required fields';
                statusMessage.style.display = 'block';
                return;
            }

            if (config.syncIntervalMinutes < 1 || config.syncIntervalMinutes > 60) {
                statusMessage.className = 'status-message error';
                statusMessage.textContent = 'Sync interval must be between 1 and 60 minutes';
                statusMessage.style.display = 'block';
                return;
            }

            // Disable button and show loading
            saveButton.disabled = true;
            saveButton.textContent = 'Saving...';
            statusMessage.className = 'status-message info';
            statusMessage.textContent = 'Saving configuration...';
            statusMessage.style.display = 'block';

            try {
                const result = await window.electronAPI.saveConfig(config);

                if (result.success) {
                    statusMessage.className = 'status-message success';
                    statusMessage.textContent = '✓ Settings saved successfully!';

                    setTimeout(() => {
                        window.close();
                    }, 1500);
                } else {
                    throw new Error(result.error || 'Failed to save configuration');
                }
            } catch (error) {
                statusMessage.className = 'status-message error';
                statusMessage.textContent = `Error: ${error.message}`;
                saveButton.disabled = false;
                saveButton.textContent = 'Save Changes';
            }
        });
    </script>
</body>
</html>
